<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <title>LifeOS Login</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="page-wrapper d-flex align-items-center justify-content-center min-vh-100">
        <!-- Wrapper for animated border effect -->
        <div class="login-card-wrapper">
            <div class="login-card">
                <div class="login-details">
                    <h1 class="text-white" style="font-family: 'Nunito Sans';">LifeOS</h1>
                    <h6 class="text-white mb-4">Welcome Back</h6>
                    <form class="w-100">
                        <label for="username" class="text-white">Username</label>
                        <input type="text" id="username" class="form-control mb-3">

                        <label for="password" class="text-white">Password</label>
                        <input type="password" id="password" class="form-control mb-3">

                        <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
                    </form>
                    <div class="links mt-3 d-flex flex-start">
                        <a href="#" class="text-white me-3">Forgot Password?</a>
                        <a href="#" class="text-white">Sign up</a>
                    </div>
                </div>
                <div class="login-img">
                    <img src="{% static 'image/guy-no-bg.png' %}" alt="Person working at desk" class="login-illustration">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
